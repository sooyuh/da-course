# Cloudflare Pages configuration
name = "da-course-p"
compatibility_date = "2024-04-20"

[build]
command = "cd frontend && npm install && npm run build"
bucket = "frontend/dist"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[redirects]]
from = "/api/*"
to = "http://localhost:5000/api/:splat"
status = 200
